project:
  root: "."
  output_dir: "./outputs"
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"

data:
  scenes:
    - name: train
      source_path: "./data/tandt/train"
      model_path: "./data/gs_models/train_original"
      ply_path: "./data/train.ply"
    - name: truck
      source_path: "./data/tandt/truck"
      model_path: "./data/gs_models/truck_original"
      ply_path: "./data/truck.ply"

env:
  # grid_size is now only the starting grid for adaptive voxel grouping.
  # The grouping code searches up to max_search_grid_size and merges nearby
  # voxel cells so each full scene gets about target_num_groups groups.
  grid_size: 4
  target_num_groups: 128
  max_search_grid_size: 32
  min_group_size: 10
  # max_groups is debug-only truncation after grouping. Keep it null for
  # formal runs; use CLI --max-groups only for smoke tests.
  max_groups: null
  target_size_ratio: 0.3
  # Default stays dummy-only so the repo can be smoke-tested without CUDA,
  # gaussian-splatting, or CrossScore installed.
  use_dummy_reward: true
  use_render: false
  use_crossscore: false
  iteration: 30000
  resolution: 4
  terminal_reward_only: true

training:
  episodes: 10
  gamma: 0.99
  batch_size: 32
  seed: 42
  # 25 action IDs need action-space noise, not the old tiny 0.2-level noise.
  exploration_std: 5.0

paths:
  gaussian_splatting_dir: "./gaussian-splatting-main"
  crossscore_dir: "./CrossScore-main"

render:
  python_executable: "python"
  gaussian_splatting_dir: "./gaussian-splatting-main"
  iteration: 30000
  resolution: 4

quality:
  cache_original_score: true
  score_higher_is_better: true
  crossscore_mode: "official_predict"
  epsilon: 0.05
  dense_alpha: 1.0
  violation_alpha: 2.0

crossscore:
  command_template: ""
  score_output: ""
  score_parse_mode: "auto"
  preferred_score_key: "pred_ssim_0_1"
  python_executable: "python"
  ckpt: "ckpt/CrossScore-v1.0.0.ckpt"
  config: "config/default_predict.yaml"
  allow_image_fallback: false

action:
  mode: "factorized_25_lightgaussian_compact"
  num_actions: 25
  pruning_rates: [0.0, 0.05, 0.10, 0.20, 0.30]
  precision_profiles:
    - {sh_degree: 3, sh_bit: 16, geo_bit: 16}
    - {sh_degree: 2, sh_bit: 12, geo_bit: 16}
    - {sh_degree: 2, sh_bit: 8, geo_bit: 12}
    - {sh_degree: 1, sh_bit: 8, geo_bit: 10}
    - {sh_degree: 0, sh_bit: 6, geo_bit: 8}

compact:
  format: "lightgaussian_extreme_saving_adapted"
  size_for_reward: "compact_size_ratio"
  render_model: "decoded_float_ply"
